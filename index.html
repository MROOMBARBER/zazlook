<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Zaz Look - Expérience 3D Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Fond et thème sombre avec dégradé radial */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top, #1a1a1a 0%, #050505 100%);
            color: #ffffff;
            overflow-x: hidden;
        }

        .serif { font-family: 'Playfair Display', serif; }

        /* Animation de flottaison du logo principal */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Animation de balayage doré sur le texte (Shimmer) */
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .animate-float { animation: float 4s ease-in-out infinite; }
        
        .animate-text-shimmer {
            background: linear-gradient(90deg, #b8860b, #f9e2af, #b8860b, #f9e2af, #b8860b);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }
        
        /* Design des cartes en verre 3D (Glassmorphism) */
        .glass-3d {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-3d:hover {
            transform: translateY(-8px) scale(1.02) rotateX(5deg);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 15px rgba(212, 175, 55, 0.2);
        }

        /* Boîtes d'icônes avec effet de rotation au survol */
        .icon-box {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.5s ease;
            overflow: hidden;
        }
        
        .glass-3d:hover .icon-box { transform: rotateY(180deg); }

        /* Couleurs spécifiques aux réseaux et marques */
        .insta-gradient { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .wa-color { background: #25D366; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

            <!-- WiFi Gratuit -->

        </div>

        <!-- Pied de page -->
        <div class="mt-16 text-center">
            <div class="h-[1px] w-1/4 bg-gradient-to-r from-transparent via-gray-700 to-transparent mx-auto mb-6"></div>
            <p class="text-gray-600 text-[10px] tracking-[0.5em] uppercase font-bold">Salon Zaz Look • Casablanca • 2026</p>
        </div>
    </div>

    <script>
        // Initialisation des icônes Lucide
        lucide.createIcons();

        // Effet de parallaxe 3D suivant le mouvement de la souris (Bureau)
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.glass-3d');
            const x = (window.innerWidth / 2 - e.pageX) / 60;
            const y = (window.innerHeight / 2 - e.pageY) / 60;
            
            cards.forEach(card => {
                card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
            });
        });
    </script>
</body>
</html>
